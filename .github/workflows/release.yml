name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upstream_image_url:
        description: 'Direct URL to upstream iotbox-*.img.zip (leave blank to auto-detect)'
        required: false
        default: ''
      version:
        description: 'Version tag (e.g. v1.0.0). Defaults to today.'
        required: false
        default: ''

permissions:
  contents: write   # required to publish release assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT
          fi

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd parted unzip kpartx

      - name: Free up disk space (Odoo .img is ~5.5 GB)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Resolve upstream image
        id: upstream
        run: |
          if [[ -n "${{ inputs.upstream_image_url }}" ]]; then
            URL="${{ inputs.upstream_image_url }}"
          else
            URL="https://nightly.odoo.com/master/iotbox/"
            LATEST=$(curl -fsSL "$URL" | grep -oE 'iotbox-[0-9.]+\.img\.zip' \
                       | sort -u | tail -1)
            URL="${URL}${LATEST}"
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Upstream image: $URL"

      - name: Download and extract upstream image
        run: |
          mkdir -p build
          curl -fsSL "${{ steps.upstream.outputs.url }}" -o build/upstream.zip
          unzip -d build build/upstream.zip
          mv build/iotbox-*.img build/upstream.img
          rm build/upstream.zip
          ls -lh build/

      - name: Build patched image
        run: sudo VERSION="${{ steps.ver.outputs.version }}" \
             ./scripts/build-image.sh "$(pwd)/build/upstream.img"

      - name: Verify built image
        run: sudo ./scripts/verify-image.sh build/iotbox-filamind-${{ steps.ver.outputs.version }}.img

      - name: Compress, split, hash
        run: ./scripts/split-image.sh build/iotbox-filamind-${{ steps.ver.outputs.version }}.img

      - name: Show release artifacts
        run: ls -lh build/release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
             build/release/*.part \
             build/release/MANIFEST.sha256 \
             scripts/download-image.sh \
             scripts/download-image.ps1 \
             scripts/download-image.cmd \
             --title "filamind-iotbox ${{ steps.ver.outputs.version }}" \
             --notes "$(cat <<EOF
          ## filamind-iotbox ${{ steps.ver.outputs.version }}

          Patched Odoo IoT Box image with direct server-URL entry on the settings page.

          ### Download & reassemble

          **Linux / macOS / WSL** (bash):

          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/download-image.sh -o download-image.sh
          chmod +x download-image.sh
          ./download-image.sh ${{ steps.ver.outputs.version }}
          \`\`\`

          **Windows** (PowerShell — no WSL needed):

          \`\`\`powershell
          irm "https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/download-image.ps1" -OutFile download-image.ps1
          irm "https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/download-image.cmd" -OutFile download-image.cmd
          .\download-image.cmd ${{ steps.ver.outputs.version }}
          \`\`\`

          Or one-liner (PowerShell):

          \`\`\`powershell
          irm "https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/download-image.ps1" | iex
          \`\`\`

          Prerequisites on Windows: \`winget install --id GitHub.cli\` and \`winget install --id Facebook.Zstandard\`.

          All scripts verify SHA-256 three times — on each part, on the concatenated .zst, and on the final .img — so corrupted downloads are caught before flashing.

          ### Upstream

          Built on top of: ${{ steps.upstream.outputs.url }}
          EOF
          )"
